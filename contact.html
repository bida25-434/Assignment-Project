<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Contact</title> 
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef2f3;
            padding: 0;
        }
        header {
            background-color: #333;
            color: #EFBF04;
            padding: 20;
            top: 0;
            text-align: center;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: left;
            gap: 20px;
        }
        
        nav a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            padding: 20px;
            transition: 0.4s ease-in-out;
        }
        .navbar-nav .nav-link:hover  {
            color: #EFBF04;
            text-decoration: underline;
            transition: 0.3s ease;
        }
        .navbar-brand {
            color: #EFBF04;
            margin: 0;
        }
        main {
            padding-bottom: 50px;
        }
        .contact-text {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            line-height: 1.6;
            max-width: 600px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        form {
            width: device width;
            margin: auto;
            margin-top: 50px;
            margin-bottom: 50px;
            background-color: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        .buttons {
            margin-top: 20px;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        .submit-btn {
            background-color: green;
            color: white;
        }

        .clear-btn {
            background-color: red;
            color: white;
            margin-right: 10px;
        }

        button:hover {
            opacity: 0.9;
        }
        #success-message{
            display: none;
            margin-top: 20px;
            color: green;
            font-weight: bold;
        }
        footer {
               background-color: #333;
               color: white;
               text-align: center;
               padding: 10px;
               position: fixed;
               bottom: 0;
               width: 100%;
        }
    </style>
</head>

<body>
    <header>    
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="index.html">ODDSCOPE</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto gap-4">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="about.html">About</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="products.html">Products</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="cart.html">Cart</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="contact.html">Contact</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main class="container my-5">
        <p class="contact-text">
            For inquiries call +267 303 4345.  
            Otherwise fill the form below!
        </p>
        <form action="acknowledgement.html" method="get"
            onsubmit="showMessage()">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" required></textarea>

            <div class="buttons">
                <button type="reset" class="clear-btn">Clear</button>
                <button type="submit" class="submit-btn">Submit</button>
            </div>
        </form>
    </main>
    <footer>
        <p>&copy; ODD SCOPE APPAREL STREETWEAR 2022</p>
    </footer>
    <script>
    function showMessage() {
        alert("Thank you for contacting us. Your message has been submitted successfully!");
    }
    </script>
    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let cartDiv = document.getElementById("cart-items");
        let subtotalDiv = document.getElementById("subtotal");
        let checkoutBtn = document.getElementById("checkout-btn"); // ✅ ADD THIS
        
        function renderCart() {
            if (!cartDiv || !subtotalDiv) return;
            
            cartDiv.innerHTML = "";
            let subtotal = 0;
            
            if (cart.length === 0) {
                cartDiv.innerHTML = "<p class='empty-cart'>Your Cart is empty</p>";
                subtotalDiv.innerHTML = "Subtotal: P0";
            
                // ✅ disable checkout button if empty
                if (checkoutBtn) {
                    checkoutBtn.disabled = true;
                    checkoutBtn.textContent = "Your Cart is Empty";
                }
                return;
            }
            cart.forEach((item, index) => {
                let itemTotal = item.price * item.quantity;
                subtotal += itemTotal;
                
                cartDiv.innerHTML += `
                    <div style="border:1px solid #ccc; padding:10px; margin:10px;">
                        <img src="${item.image}" width="80">
                        
                        <p>${item.name}</p>
                        <p>Size: ${item.size} | Color: ${item.color}</p>
                        <p>Price: P${item.price}</p>
                        
                        <p>
                            Qty:
                            <button onclick="changeQty(${index}, -1)">-</button>
                            ${item.quantity}
                            <button onclick="changeQty(${index}, 1)">+</button>
                        </p>
                        
                        <p><b>Total: P${itemTotal}</b></p>
                        
                        <button onclick="removeItem(${index})">Remove</button>
                    </div>
            `    ;
            });
            
            subtotalDiv.innerHTML = `<h3>Subtotal: P${subtotal}</h3>`;
            
            localStorage.setItem("cart", JSON.stringify(cart));
            
            // ✅ enable checkout button when cart has items
            if (checkoutBtn) {
                checkoutBtn.disabled = false;
                checkoutBtn.textContent = "Proceed to Checkout";
            }
        }
        
        function changeQty(index, amount) {
            cart[index].quantity = parseInt(cart[index].quantity) + amount;
            
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            
            renderCart();
        }
        
        function removeItem(index) {
            cart.splice(index, 1);
            renderCart();
        }
        
        function clearCart() {
            localStorage.clear();
            cart = [];
            renderCart();
        }
        
        // ✅ CHECKOUT FUNCTION (NEW)
        function checkout() {
            if (cart.length === 0) {
                alert("Your cart is empty!");
                return;
            }
            
            // optional: show loading state
            checkoutBtn.disabled = true;
            checkoutBtn.textContent = "Processing...";
            
            // save final cart snapshot (optional but useful)
            localStorage.setItem("checkoutCart", JSON.stringify(cart));
            
            // redirect to checkout page
            setTimeout(() => {
                window.location.href = "checkout.html";
            }, 800);
        }
        
        renderCart();
    </script>
    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
</body>  
</html>
