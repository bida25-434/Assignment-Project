<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Shopping Cart</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color:  white;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            text-allign: left;
        }
        header {
            background-color: #333;
            color: #EFBF04;
            padding: 20;
            top: 0;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
        }
        nav a:hover {
            color: #EFBF04;
            text-decoration: underline;
        }
        #cart-items {
          display: flex;
          flex-direction: column;
          gap: 12px;
          margin-bottom: 60px;
        }
        .cart-wrapper {
          max-width: 1000px;
          margin: auto;
          padding: 15px;
          margin-bottom: 60px;
        }
        #cart-items {
          display: flex;
          flex-direction: column;
          gap: 10px;
        }
        .cart-item {
          display: flex;
          flex-direction: column;
          gap: 10px;
            
          background: white;
          padding: 12px;
          border-radius: 10px;
          border: 1px solid #ddd;
          height: 100%;
        }
        .cart-item img {
          width: 100%;
          height: 150px;
          object-fit: cover;
          border-radius: 8px;
        }
        .cart-details {
          display: flex;
          flex-direction: column;
          gap: 4px;
        }
        .cart-actions {
          display: flex;
          flex-direction: column;
          align-items: flex-end;
          gap: 8px;
        }
        #subtotal {
          margin-top: 20px;
          font-size: 18px;
          font-weight: bold;
        }
        #checkout-btn {
          width: 100%;
          padding: 12px;
          margin-top: 15px;
          background: green;
          color: white;
          border: none;
          border-radius: 8px;
        }
        @media (max-width: 600px) {
          .cart-item {
            flex-direction: column;
            align-items: flex-start;
            grid-template-columns: 1fr;
            grid-template-rows: auto auto;

            .cart-actions {
            grid-column: 1 / -1;
            flex-direction: row;
            justify-content: space-between;
            }
          }
        @media (min-width: 768px) {
          #cart-items {
            grid-template-columns: 1fr 1fr;
          }
        }
        @media (min-width: 1100px) {
            .cart-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }
          .cart-item img {
            width: 100%;
            height: auto;
          }
            
          #checkout-btn {
            font-size: 16px;
          }
        }
        img {
            width: 100px;
        }

        #clear cart-btn{
            background-color: black;
            colour: white;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>
    <header>
          <h1>MY CART</h1>
          <nav>
              <a href="index.html">Home</a>
              <a href="about.html">About</a>
              <a href="products.html">Products</a>
              <a href="cart.html">Cart</a>
              <a href="contact.html">Contact</a>
          </nav>
    </header>
    <main>
        <div id="cart-items"></div>
        <div id="subtotal"></div>
        <button onclick="clearCart()">Clear Cart</button>
        <button id="checkout-btn">Proceed to Checkout</button>
    </main>
    <footer>
         <p>&copy; ODD SCOPE APPAREL STREETWEAR 2022</p>  
    </footer>
    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let cartDiv = document.getElementById("cart-items");
        let subtotalDiv = document.getElementById("subtotal");
        let checkoutBtn = document.getElementById("checkout-btn"); // ✅ ADD THIS
        
        function renderCart() {
            if (!cartDiv || !subtotalDiv) return;
            
            cartDiv.innerHTML = "";
            let subtotal = 0;
            
            if (cart.length === 0) {
                cartDiv.innerHTML = "<p>Cart is empty</p>";
                subtotalDiv.innerHTML = "Subtotal: P0";
            
                // ✅ disable checkout button if empty
                if (checkoutBtn) {
                    checkoutBtn.disabled = true;
                    checkoutBtn.textContent = "Cart is Empty";
                }
                return;
            }
            cart.forEach((item, index) => {
                let itemTotal = item.price * item.quantity;
                subtotal += itemTotal;
                
                cartDiv.innerHTML += `
                    <div style="border:1px solid #ccc; padding:10px; margin:10px;">
                        <img src="${item.image}" width="80">
                        
                        <p>${item.name}</p>
                        <p>Size: ${item.size} | Color: ${item.color}</p>
                        <p>Price: P${item.price}</p>
                        
                        <p>
                            Qty:
                            <button onclick="changeQty(${index}, -1)">-</button>
                            ${item.quantity}
                            <button onclick="changeQty(${index}, 1)">+</button>
                        </p>
                        
                        <p><b>Total: P${itemTotal}</b></p>
                        
                        <button onclick="removeItem(${index})">Remove</button>
                    </div>
            `    ;
            });
            
            subtotalDiv.innerHTML = `<h3>Subtotal: P${subtotal}</h3>`;
            
            localStorage.setItem("cart", JSON.stringify(cart));
            
            // ✅ enable checkout button when cart has items
            if (checkoutBtn) {
                checkoutBtn.disabled = false;
                checkoutBtn.textContent = "Proceed to Checkout";
            }
        }
        
        function changeQty(index, amount) {
            cart[index].quantity = parseInt(cart[index].quantity) + amount;
            
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            
            renderCart();
        }
        
        function removeItem(index) {
            cart.splice(index, 1);
            renderCart();
        }
        
        function clearCart() {
            localStorage.clear();
            cart = [];
            renderCart();
        }
        
        // ✅ CHECKOUT FUNCTION (NEW)
        function checkout() {
            if (cart.length === 0) {
                alert("Your cart is empty!");
                return;
            }
            
            // optional: show loading state
            checkoutBtn.disabled = true;
            checkoutBtn.textContent = "Processing...";
            
            // save final cart snapshot (optional but useful)
            localStorage.setItem("checkoutCart", JSON.stringify(cart));
            
            // redirect to checkout page
            setTimeout(() => {
                window.location.href = "checkout.html";
            }, 800);
        }
        
        renderCart();
    </script>
</body>  
</html>
