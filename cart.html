<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Shopping Cart</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color:  white;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            text-allign: left;
        }
        header {
            background-color: #333;
            color: #EFBF04;
            padding: 20;
            top: 0;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
        }
        nav a:hover {
            color: #EFBF04;
            text-decoration: underline;
        }
        #cart-items div {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
    </style>
</head>

<body>
    <header>
          <h1>MY CART</h1>
          <nav>
              <a href="index.html">Home</a>
              <a href="about.html">About</a>
              <a href="products.html">Products</a>
              <a href="cart.html">Cart</a>
              <a href="contact.html">Contact</a>
          </nav>
    </header>
    <main>
        <div id="cart-items"></div>
        <button onclick="clearCart()">Clear Cart</button>
    </main>
    <footer>
         <p>&copy; ODD SCOPE APPAREL STREETWEAR 2022</p>  
    </footer>
    <script>
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let cartDiv = document.getElementById("cart-items");

    if (cart.length === 0) {
        cartDiv.innerHTML = "<p>Your cart is empty.</p>";
    } else {
        cart.forEach(item => {
            cartDiv.innerHTML += `
                <div>
                    <img src="${item.image}" width="100">
                    <p>${item.name} - P${item.price}</p>
                    <p>Size: ${item.size} | Color: ${item.color} | Qty: ${item.quantity}</p>
                    <button onclick="changeQty(${index}, -1)">-</button>
                    <button onclick="changeQty(${index}, 1)">+</button>
                    <button onclick="removeItem(${index})">Remove</button>
                </div>
    `    ;
    });
        localStorage.setItem("cart", JSON.stringify(cart));
    }

    function changeQty(index, amount) {
        cart[index].quantity = parseInt(cart[index].quantity) + amount;

        if (cart[index].quantity <= 0) {
            cart.splice(index, 1); // remove item if 0
    }

        renderCart();
    }

    function removeItem(index) {
        cart.splice(index, 1);
        renderCart();
    }

    renderCart();
    function clearCart() {
        localStorage.removeItem("cart");
        cart = [];
        renderCart();
    }
    </script>
    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
</body>  
</html>
