<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Shopping Cart</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color:  white;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            text-allign: left;
        }
        header {
            background-color: #333;
            color: #EFBF04;
            padding: 20;
            top: 0;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
        }
        nav a:hover {
            color: #EFBF04;
            text-decoration: underline;
        }
        #cart-items div {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        img {
            width: 100px;
        }
    </style>
</head>

<body>
    <header>
          <h1>MY CART</h1>
          <nav>
              <a href="index.html">Home</a>
              <a href="about.html">About</a>
              <a href="products.html">Products</a>
              <a href="cart.html">Cart</a>
              <a href="contact.html">Contact</a>
          </nav>
    </header>
    <main>
        <div id="cart-items"></div>
        <button onclick="clearCart()">Clear Cart</button>
    </main>
    <footer>
         <p>&copy; ODD SCOPE APPAREL STREETWEAR 2022</p>  
    </footer>
    <script>
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let cartDiv = document.getElementById("cart-items");
    let subtotalDiv = document.getElementById("subtotal");

    function renderCart() {
        cartDiv.innerHTML = "";
        let subtotal = 0;

        if (cart.length === 0) {
            cartDiv.innerHTML = "<p>Cart is empty</p>";
            subtotalDiv.innerHTML = "Subtotal: P0";
            return;
        }

        cart.forEach((item, index) => {
            let itemTotal = item.price * item.quantity;
            subtotal += itemTotal;

            cartDiv.innerHTML += `
                <div>
                    <img src="${item.image}" style="width:80px;">
                    <div>
                        <p>${item.name}</p>
                        <p>Size: ${item.size}</p>
                        <p>Price: P${item.price}</p>
                        <p>Qty: ${item.quantity}</p>
                        <p>Total: P${itemTotal}</p>

                        <button onclick="changeQty(${index}, -1)">-</button>
                        <button onclick="changeQty(${index}, 1)">+</button>
                        <button onclick="removeItem(${index})">Remove</button>
                    </div>
                </div>
        `    ;
        });

        subtotalDiv.innerHTML = `<h3>Subtotal: P${subtotal}</h3>`;

        localStorage.setItem("cart", JSON.stringify(cart));
    }

    function changeQty(index, amount) {
        cart[index].quantity += amount;

        if (cart[index].quantity <= 0) {
            cart.splice(index, 1);
        }

        renderCart();
    }

    function removeItem(index) {
        cart.splice(index, 1);
        renderCart();
    }

    function clearCart() {
        localStorage.clear();
        cart = [];
        renderCart();
    }

    renderCart();
    </script>
    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
</body>  
</html>
