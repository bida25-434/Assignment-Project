<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Products</title> 
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color:  white;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            text-allign: left;
        }
        header {
            background-color: #333;
            color: #EFBF04;
            padding: 20;
            top: 0;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
        }
        nav a:hover {
            color: #EFBF04;
            text-decoration: underline;
        }
        .btn {
            position: fiexd;
            text-align: right;
        }
        .products-container {
            display: grid;
            grid-template-columns: 1fr; 
            gap: 20px;
            padding: 20px;
            margin-bottom: 60px;
        }

        .product {
            border: 1px solid #ccc;
            padding: 15px;
            text-align: center;
            border-radius: 10px;
            background-color: #f9f9f9;
        }

        .product img {
            width: 100%;
            max-width: 100%;
            height: auto;
        }

        .product button {
            margin-top: 10px;
            padding: 10px;
            background-color: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        .product button:hover {
            background-color: gray;
        }
        @media (min-width: 600px) {
            .products-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (min-width: 1000px) {
            .products-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>
    <header>
          <h1>ODDSCOPE PRODUCTS</h1>
          <nav>
              <a href="index.html">Home</a>
              <a href="about.html">About</a>
              <a href="products.html">Products</a>
              <a href="cart.html">Cart</a>
              <a href="contact.html">Contact</a>
          </nav>
    </header>
    <main>
        <a href="cart.html" class="btn btn-warning mt-3" id="cartBtn">
          View cart <span id="cartCount" class="badge bg-dark ms-2">0</span>
        </a>
        <div class="products-container">
            <div class="product" data-name="t shirt">
                <img id="tshirt-image" src="t shirt-black.jpeg" alt="ODDSCOPE T-shirt" width="200">
                <p>T-shirt</p>   
                <p>P250</p>
                <label>Size:</label>
                <select id="size-tshirt">
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                </select>

                <label>Color:</label>
                <select id="color-tshirt" onchange="changeProductColor(this)">
                    <option value="Black">Black</option>
                    <option value="White">White</option>
                    <option value="Blue">Blue</option>
                </select>

                <label>Qty:</label>
                <input type="number" id="qty-tshirt" value="1" min="1" max="20">    

                <button onclick="addToCart(
                    document.getElementById('tshirt-image').src,
                    'T-shirt',
                    250,
                    document.getElementById('size-tshirt').value,
                    document.getElementById('color-tshirt').value,
                    document.getElementById('qty-tshirt').value
                )">
                    Add to Cart
                </button>
            </div>
            <div class="product" data-name="track pants">
                <img id="trackpants-image" src="track pants-grey.jpeg" alt="ODDSCOPE Track Pants" width="200">
                <p>Track Pants</p>
                <p>P300</p>
                <label>Size:</label>
                <select id="size-trackpants">
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                </select>

                <label>Color:</label>
                <select id="color-trackpants" onchange="changeProductColor(this)">
                    <option value="Grey">Grey</option>
                    <option value="White">White</option>
                    <option value="Black">Black</option>
                </select>

                <label>Qty:</label>
                <input type="number" id="qty-trackpants" value="1" min="1" max="20">    

                <button onclick="addToCart(
                    document.getElementById('trackpants-image').src,
                    'Track pants',
                    300,
                    document.getElementById('size-trackpants').value,
                    document.getElementById('color-trackpants').value,
                    document.getElementById('qty-trackpants').value
                )">
                    Add to Cart
                </button>
            </div>
            <div class="product" data-name="hoodie">
                <img id="hoodie-image" src="hoodie-soft pink.jpeg" alt="ODDSCOPE Hoodie" width="200">
                <p>Hoodie</p>
                <p>P350</p>
                <label>Size:</label>
                <select id="size-hoodie">
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                </select>

                <label>Color:</label>
                <select id="color-hoodie" onchange="changeProductColor(this)">
                    <option value="Soft pink">Soft pink</option>
                    <option value="White">White</option>
                    <option value="Black">Black</option>
                </select>

                <label>Qty:</label>
                <input type="number" id="qty-hoodie" value="1" min="1" max="20">    

                <button onclick="addToCart(
                    document.getElementById('hoodie-image').src,
                    'Hoodie',
                    350,
                    document.getElementById('size-hoodie').value,
                    document.getElementById('color-hoodie').value,
                    document.getElementById('qty-hoodie').value
                )">
                    Add to Cart
                </button>
            </div>
            <div class="product" data-name="bucket hat">
                <img id="buckethat-image" src="bucket hat-black.jpeg" alt="ODDSCOPE Bucket hat" width="200">       
                <p>Bucket hat</p>
                <p>P150</p>
                <label>Size:</label>
                <select id="size-buckethat">
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                </select>
                    
                <label>Color:</label>
                <select id="color-buckethat" onchange="changeProductColor(this)">
                    <option value="Black">Black</option>
                    <option value="White">White</option>
                    <option value="Red">Red</option>
                </select>
                
                <label>Qty:</label>
                <input type="number" id="qty-buckethat" value="1" min="1" max="20">    
                
                <button onclick="addToCart(
                    document.getElementById('buckethat-image').src,
                    'Bucket hat',
                    150,
                    document.getElementById('size-buckethat').value,
                    document.getElementById('color-buckethat').value,
                    document.getElementById('qty-buckethat').value
                )">
                    Add to Cart
                </button>
            </div>
            <div class="product" data-name="shorts">
                <img id="shorts-image" src="shorts-brown.jpeg" alt="ODDSCOPE Shorts" width="200">
                <p>Shorts</p>
                <p>P250</p>
                <label>Size:</label>
                <select id="size-shorts">
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                </select>

                <label>Color:</label>
                <select id="color-shorts" onchange="changeProductColor(this)">
                    <option value="Brown">Brown</option>
                    <option value="Black">Black</option>
                    <option value="Navy blue">Navy blue</option>
                </select>

                <label>Qty:</label>
                <input type="number" id="qty-shorts" value="1" min="1" max="20">    

                <button onclick="addToCart(
                    document.getElementById('shorts-image').src,
                    'Shorts',
                    250,
                    document.getElementById('size-shorts').value,

                    document.getElementById('qty-shorts').value

            </div>
            <div class="product" data-name="baseball cap">
                <img id="baseballcap-image" src="baseball cap-black.jpeg" alt="ODDSCOPE Baseball cap" width="200">
                <p>Baseball cap</p>
                <p>P200</p>
                <label>Size:</label>
                <select id="size-baseballcap">
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                </select>

                <label>Color:</label>
                <select id="color-baseballcap" onchange="changeProductColor(this)">
                    <option value="Black">Black</option>
                    <option value="Red">Red</option>
                    <option value="Navy blue">Navy blue</option>
                </select>

                <label>Qty:</label>
                <input type="number" id="qty-baseballcap" value="1" min="1" max="20">    

                <button onclick="addToCart(
                    document.getElementById('baseballcap-image').src,
                    'Baseball cap',
                    200,
                    document.getElementById('size-baseballcap').value,
                    document.getElementById('color-baseballcap').value,
                    document.getElementById('qty-baseballcap').value
                )">
                    Add to Cart
                </button>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; ODD SCOPE APPAREL STREETWEAR 2022</p>
    </footer>
    <script>
    function addToCart(image, name, price, size, color, qty) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        cart.push({ image: image, name: name, price: price, size: size, color: color, quantity: qty });

        localStorage.setItem("cart", JSON.stringify(cart));

        alert(name + " added to cart!");
    }
    function changeProductColor(selectElement) {
        let productDiv = selectElement.closest(".product");
        let image = productDiv.querySelector("img");

        let productName = productDiv.dataset.name;
        let color = selectElement.value.toLowerCase();

        image.src = productName + "-" + color + ".jpeg";
    }
    </script>
    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
</body>  
</html>
