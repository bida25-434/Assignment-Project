<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Products</title> 
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color:  white;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            text-allign: left;
        }
        header {
            background-color: #333;
            color: #EFBF04;
            padding: 20;
            top: 0;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
        }
        nav a:hover {
            color: #EFBF04;
            text-decoration: underline;
        }
.products-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr); 
    gap: 20px;
    padding: 20px;
}

.product {
    border: 1px solid #ccc;
    padding: 15px;
    text-align: center;
    border-radius: 10px;
    background-color: #f9f9f9;
}

.product img {
    width: 100%;
    max-width: 200px;
    height: auto;
}

.product button {
    margin-top: 10px;
    padding: 10px;
    background-color: black;
    color: white;
    border: none;
    cursor: pointer;
}

.product button:hover {
    background-color: gray;
}
    </style>
</head>

<body>
    <header>
          <h1>ODDSCOPE PRODUCTS</h1>
          <nav>
              <a href="index.html">Home</a>
              <a href="about.html">About</a>
              <a href="products.html">Products</a>
              <a href="cart.html">Cart</a>
              <a href="contact.html">Contact</a>
          </nav>
    </header>
    <main>
        <div class="products-container">
            <div class="product">
                <img src="t shirt.jpeg" alt="ODDSCOPE T-shirt" width="200">
                <p>T-shirt</p>   
                <p>P250</p>
                <label>Size:</label>
                <select id="size-tshirt">
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                </select>

                <label>Color:</label>
                <select id="color-tshirt">
                    <option value="Black">Black</option>
                    <option value="White">White</option>
                    <option value="Blue">Blue</option>
                </select>

                <label>Qty:</label>
                <input type="number" id="qty-tshirt" value="1" min="1">

                <button onclick="addToCart(
                    'T-shirt',
                    250,
                    document.getElementById('size-tshirt').value,
                    document.getElementById('color-tshirt').value,
                    document.getElementById('qty-tshirt').value
                )">
                    Add to Cart
                </button>
            </div>
            <div class="product">
                <img src="track pants.jpeg" alt="ODDSCOPE Track Pants" width="200">
                <p>Track Pants</p>
                <p>P300</p>
                <button onclick="addToCart('Track Pants', 300)">Add to Cart</button>
            </div>
            <div class="product">
                <img src="hoodie.jpeg" alt="ODDSCOPE Hoodie" width="200">
                <p>Hoodie</p>
                <p>P350</p>
                <button onclick="addToCart('Hoodie', 350)">Add to Cart</button>
            </div>
            <div class="product">
                <img src="bucket hat.jpeg" alt="ODDSCOPE Bucket hat" width="200">       
                <p>Bucket hat</p>
                <p>P150</p>
                <button onclick="addToCart('Bucket Hat', 150)">Add to Cart</button>
            </div>
            <div class="product">
                <p>Shorts</p>
                <p>P250</p>
                <button onclick="addToCart('Shorts', 250)">Add to Cart</button>
            </div>
            <div class="product">
                <p>Baseball cap</p>
                <p>P200</p>
                <button onclick="addToCart('Baseball cap', 200)">Add to Cart</button>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; ODD SCOPE APPAREL STREETWEAR 2022</p>
    </footer>
    <script>
    function addToCart(name, price) {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        cart.push({ name: name, price: price });

        localStorage.setItem("cart", JSON.stringify(cart));

        alert(name + " added to cart!");
    }
    </script>
    <!-- Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
</body>  
</html>
